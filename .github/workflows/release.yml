name: release

on:
  workflow_dispatch:
    inputs:
      pymol_version:
        description: "PyMOL ref used for the build"
        required: false
        default: "dev"
        type: string
      build_run_id:
        description: "Build workflow run ID (optional - will use latest successful if not provided)"
        required: false
        type: string

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  PYMOL_VERSION: ${{ inputs.pymol_version || 'dev' }}

concurrency:
  group: release-${{ inputs.build_run_id || 'latest-successful-build' }}
  cancel-in-progress: false

jobs:
  github-release:
    name: Create or Update GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Find latest successful build run
        id: find-build
        uses: ./.github/actions/find-build-run
        with:
          build_run_id: ${{ inputs.build_run_id }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts from build workflow
        uses: actions/download-artifact@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.find-build.outputs.run-id }}
          path: artifacts

      - name: Read build metadata
        id: metadata
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          metadata_files = sorted(Path("artifacts").glob("**/version.json"))
          if not metadata_files:
              raise SystemExit("No build metadata artifact found")

          metadata = json.loads(metadata_files[0].read_text(encoding="utf-8"))

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              for key in (
                  "source_ref",
                  "source_sha",
                  "source_short_sha",
                  "upstream_version",
                  "wheel_version",
                  "release_version_label",
                  "is_exact_release",
              ):
                  value = metadata[key]
                  if isinstance(value, bool):
                      value = str(value).lower()
                  fh.write(f"{key}={value}\n")
          PY

      - name: Prepare release assets
        run: |
          mkdir release-assets
          find artifacts -name "*.whl" -exec cp {} release-assets/ \;
          echo "Release assets:"
          ls -la release-assets/

      - name: Create or update GitHub release with wheels
        uses: actions/github-script@v8
        env:
          SOURCE_REF: ${{ steps.metadata.outputs.source_ref }}
          SOURCE_SHA: ${{ steps.metadata.outputs.source_sha }}
          UPSTREAM_VERSION: ${{ steps.metadata.outputs.upstream_version }}
          WHEEL_VERSION: ${{ steps.metadata.outputs.wheel_version }}
          RELEASE_VERSION_LABEL: ${{ steps.metadata.outputs.release_version_label }}
          IS_EXACT_RELEASE: ${{ steps.metadata.outputs.is_exact_release }}
          BUILD_RUN_ID: ${{ steps.find-build.outputs.run-id }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const releaseVersionLabel = process.env.RELEASE_VERSION_LABEL;
            const upstreamVersion = process.env.UPSTREAM_VERSION;
            const wheelVersion = process.env.WHEEL_VERSION;
            const sourceRef = process.env.SOURCE_REF;
            const sourceSha = process.env.SOURCE_SHA;
            const buildRunId = process.env.BUILD_RUN_ID;
            const isExactRelease = process.env.IS_EXACT_RELEASE === 'true';
            const releaseTag = `pymol-${releaseVersionLabel}-build-${buildRunId}`;
            const releaseName = `PyMOL ${releaseVersionLabel} (build ${buildRunId})`;
            const releaseBody = `PyMOL wheels built and ready for download.

            **Source:** https://github.com/schrodinger/pymol-open-source/
            **PyMOL ref:** \`${sourceRef}\`
            **PyMOL commit:** \`${sourceSha}\`
            **Upstream version:** \`${upstreamVersion}\`
            **Wheel version:** \`${wheelVersion}\`
            **Build workflow run:** \`${buildRunId}\`

            ## Installation

            Download the wheel file for your platform and install with:
            \`\`\`bash
            pip install ./pymol_opensource_wl-*.whl
            \`\`\`

            Or install from PyPI:
            \`\`\`bash
            pip install pymol-opensource-wl
            \`\`\`

            ## What's included

            - Linux wheels (x86_64)
            - Windows wheels (x86_64)
            - Python 3.10, 3.11, 3.12, 3.13, 3.14 support

            Built automatically from PyMOL upstream source using official build instructions.`;

            let release;
            try {
              release = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: releaseTag,
              });
              release = await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: release.data.id,
                tag_name: releaseTag,
                name: releaseName,
                body: releaseBody,
                draft: false,
                prerelease: !isExactRelease,
                make_latest: isExactRelease ? 'true' : 'false',
              });
              console.log(`Updating existing release: ${release.data.html_url}`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              try {
                release = await github.rest.repos.createRelease({
                  owner,
                  repo,
                  tag_name: releaseTag,
                  name: releaseName,
                  body: releaseBody,
                  draft: false,
                  prerelease: !isExactRelease,
                  make_latest: isExactRelease ? 'true' : 'false',
                });
                console.log(`Created release: ${release.data.html_url}`);
              } catch (createError) {
                // If another run created the same build release after our
                // lookup, reuse it instead of failing with HTTP 422.
                if (createError.status !== 422) {
                  throw createError;
                }
                release = await github.rest.repos.getReleaseByTag({
                  owner,
                  repo,
                  tag: releaseTag,
                });
                console.log(`Reusing concurrently created release: ${release.data.html_url}`);
              }
            }

            const existingAssets = await github.paginate(
              github.rest.repos.listReleaseAssets,
              { owner, repo, release_id: release.data.id, per_page: 100 }
            );
            const assetsByName = new Map(existingAssets.map(asset => [asset.name, asset]));
            const assetsDir = './release-assets';
            const files = fs.readdirSync(assetsDir).filter(file => file.endsWith('.whl'));

            for (const file of files) {
              const existingAsset = assetsByName.get(file);
              if (existingAsset) {
                await github.rest.repos.deleteReleaseAsset({
                  owner,
                  repo,
                  asset_id: existingAsset.id,
                });
                console.log(`Deleted existing asset: ${file}`);
              }

              await github.rest.repos.uploadReleaseAsset({
                owner,
                repo,
                release_id: release.data.id,
                name: file,
                data: fs.readFileSync(path.join(assetsDir, file)),
              });
              console.log(`Uploaded asset: ${file}`);
            }
