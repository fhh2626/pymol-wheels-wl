name: build

on:
  workflow_dispatch:
    inputs:
      pymol_version:
        description: "PyMOL ref: dev, latest, tag, branch, or commit SHA"
        required: false
        default: "dev"
        type: string

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  PYMOL_VERSION: ${{ inputs.pymol_version || 'dev' }}

jobs:
  # --------------------------
  # Resolve source and version metadata
  # --------------------------
  detect-version:
    name: Resolve PyMOL Source
    runs-on: ubuntu-latest
    outputs:
      source_ref: ${{ steps.resolve-ref.outputs.ref }}
      source_sha: ${{ steps.metadata.outputs.source_sha }}
      source_short_sha: ${{ steps.metadata.outputs.source_short_sha }}
      upstream_version: ${{ steps.metadata.outputs.upstream_version }}
      wheel_version: ${{ steps.metadata.outputs.wheel_version }}
      release_version_label: ${{ steps.metadata.outputs.release_version_label }}
      is_exact_release: ${{ steps.metadata.outputs.is_exact_release }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Resolve PyMOL ref
        id: resolve-ref
        uses: actions/github-script@v8
        env:
          REQUESTED_REF: ${{ env.PYMOL_VERSION }}
        with:
          script: |
            const requested = (process.env.REQUESTED_REF || 'dev').trim();
            const owner = 'schrodinger';
            const repo = 'pymol-open-source';
            const repoInfo = await github.rest.repos.get({ owner, repo });

            let ref = requested;
            if (!requested || requested === 'dev') {
              ref = repoInfo.data.default_branch;
            } else if (requested === 'latest') {
              const release = await github.rest.repos.getLatestRelease({ owner, repo });
              ref = release.data.tag_name;
            } else if (/^\d+\.\d+(\.\d+)?$/.test(requested)) {
              ref = `v${requested}`;
            }

            core.notice(`Resolved PyMOL ref "${requested || 'dev'}" to "${ref}"`);
            core.setOutput('ref', ref);

      - name: Checkout PyMOL source
        uses: actions/checkout@v5
        with:
          repository: schrodinger/pymol-open-source
          ref: ${{ steps.resolve-ref.outputs.ref }}
          path: pymol-source
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Determine PyMOL build metadata
        id: metadata
        run: |
          python .github/scripts/resolve_pymol_build_metadata.py \
            --repo-dir pymol-source \
            --json-out build-metadata/version.json \
            --source-ref "${{ steps.resolve-ref.outputs.ref }}" \
            --build-number "${{ github.run_id }}"

      - name: Upload build metadata
        uses: actions/upload-artifact@v6
        with:
          name: pymol-build-metadata
          path: build-metadata/version.json

  # --------------------------
  # Build Linux wheels
  # --------------------------
  build-Linux:
    runs-on: ubuntu-22.04
    needs: detect-version

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
      fail-fast: false

    steps:
      - name: Get source
        uses: actions/checkout@v5
        with:
          repository: schrodinger/pymol-open-source
          ref: ${{ needs.detect-version.outputs.source_ref }}

      - name: Checkout wheel build scripts
        uses: actions/checkout@v5
        with:
          path: wheel-build-repo

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Report version
        run: |
          echo "Building PyMOL wheel:"
          echo "  Source ref: ${{ needs.detect-version.outputs.source_ref }}"
          echo "  Source SHA: ${{ needs.detect-version.outputs.source_sha }}"
          echo "  Upstream version: ${{ needs.detect-version.outputs.upstream_version }}"
          echo "  Wheel version: ${{ needs.detect-version.outputs.wheel_version }}"
          echo "  Release label: ${{ needs.detect-version.outputs.release_version_label }}"
          echo "  Python version: ${{ matrix.python-version }}"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get --no-install-recommends install \
              catch2 \
              libfreetype6-dev \
              libglew-dev \
              libglm-dev \
              libmsgpack-dev \
              libnetcdf-dev \
              libpng-dev \
              libxml2-dev
          wget -nv https://anaconda.org/schrodinger/collada2gltf/2.1.4/download/linux-64/collada2gltf-2.1.4-h6bb024c_0.tar.bz2
          sudo tar xf collada2gltf-*.tar.bz2 -C / bin/collada2gltf

      - name: Get additional sources
        run: |
          git clone --depth 1 https://github.com/rcsb/mmtf-cpp.git
          cp -R mmtf-cpp/include/* include/

      - name: Build
        run: |
          pip install --upgrade pip
          pip install \
            "biopython>=1.80" \
            "msgpack>=1.0.8" \
            "pillow>=11.1.0" \
            "PySide6>=6.10.1" \
            "pytest>=8.2.2" \
            "requests>=2.32.3"
          pip install -v --config-settings testing=True .

      - name: Test
        run: |
          pymol -ckqy testing/testing.py --run all

      - name: Build wheel
        run: |
          pip install --upgrade pip build wheel
          python -m build --wheel

      - name: Rename wheel
        run: |
          pip install auditwheel patchelf change-wheel-version
          python wheel-build-repo/.github/scripts/rename_wheel_distribution.py dist/*.whl --name pymol-opensource-wl --delete-old
          if [ "${{ needs.detect-version.outputs.is_exact_release }}" != "true" ]; then
            python -m change_wheel_version dist/pymol_opensource_wl-*.whl \
              --version "${{ needs.detect-version.outputs.wheel_version }}" \
              --delete-old-wheel
          fi
          auditwheel repair dist/pymol_opensource_wl-*.whl

      - name: Test repaired Linux wheel in isolated venv
        run: |
          python -m venv wheel-test
          python_bin="./wheel-test/bin/python"
          "$python_bin" -m pip install --upgrade pip numpy
          wheel=$(ls wheelhouse/pymol_opensource_wl*.whl | head -n 1)
          "$python_bin" -m pip install --no-deps "$wheel"
          "$python_bin" -c "import pymol; import pymol._cmd; print('pymol._cmd import ok')"
          ./wheel-test/bin/pymol -cq

      - name: Upload wheel
        uses: actions/upload-artifact@v6
        with:
          name: pymol-linux-${{ matrix.python-version }}
          path: wheelhouse/pymol_opensource_wl*.whl

  # --------------------------
  # Build Windows wheels
  # --------------------------
  build-Windows:
    runs-on: windows-latest
    needs: detect-version

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
      fail-fast: false

    env:
      CONDA_ENV_NAME: "testing_env"

    steps:
      - name: Get source
        uses: actions/checkout@v5
        with:
          repository: schrodinger/pymol-open-source
          ref: ${{ needs.detect-version.outputs.source_ref }}

      - name: Checkout wheel build scripts
        uses: actions/checkout@v5
        with:
          path: wheel-build-repo

      - name: Install Miniforge
        run: |
          choco install miniforge3

      - name: Add conda to PATH
        run: |
          echo "$env:CONDA" | Out-File -Append -FilePath $env:GITHUB_PATH
          echo "$env:CONDA\Scripts" | Out-File -Append -FilePath $env:GITHUB_PATH

      - name: Set up Miniforge
        run: |
          conda init powershell
          conda create --name $env:CONDA_ENV_NAME -c conda-forge -c schrodinger `
              python=${{ matrix.python-version }} `
              pip `
              "catch2>=2.13.3,<3" `
              collada2gltf `
              freetype `
              glew `
              glm `
              libpng `
              libxml2 `
              libxml2-devel `
              libnetcdf `

      - name: Report version
        run: |
          echo "Building PyMOL wheel:"
          echo "  Source ref: ${{ needs.detect-version.outputs.source_ref }}"
          echo "  Source SHA: ${{ needs.detect-version.outputs.source_sha }}"
          echo "  Upstream version: ${{ needs.detect-version.outputs.upstream_version }}"
          echo "  Wheel version: ${{ needs.detect-version.outputs.wheel_version }}"
          echo "  Release label: ${{ needs.detect-version.outputs.release_version_label }}"
          echo "  Python version: ${{ matrix.python-version }}"

      - name: Get additional sources
        run: |
          conda activate $env:CONDA_ENV_NAME

          git clone --depth 1 https://github.com/rcsb/mmtf-cpp.git
          Copy-Item -Recurse -Path mmtf-cpp/include\* -Destination "$env:CONDA_PREFIX\Library\include"
          git clone --depth 1 --single-branch --branch cpp_master https://github.com/msgpack/msgpack-c.git
          Copy-Item -Recurse -Path msgpack-c/include\* -Destination "$env:CONDA_PREFIX\Library\include"
          dir $env:CONDA_PREFIX\Library\include

      - name: Verify Windows build inputs
        run: |
          conda activate $env:CONDA_ENV_NAME
          pip install --upgrade pip build wheel setuptools numpy cmake

          $includeRoot = "$env:CONDA_PREFIX\Library\include"
          $libRoot = "$env:CONDA_PREFIX\Library\lib"
          $binRoot = "$env:CONDA_PREFIX\Library\bin"
          $missing = New-Object System.Collections.Generic.List[string]

          function Test-AnyPath {
            param(
              [string] $Name,
              [string[]] $Paths
            )
            foreach ($path in $Paths) {
              if (Test-Path $path) {
                Write-Host "$Name -> $path"
                return
              }
            }
            $missing.Add("$Name (checked: $($Paths -join ', '))")
          }

          Test-AnyPath "GLEW header" @("$includeRoot\GL\glew.h")
          Test-AnyPath "FreeType ft2build header" @("$includeRoot\ft2build.h", "$includeRoot\freetype2\ft2build.h")
          Test-AnyPath "FreeType API header" @("$includeRoot\freetype\freetype.h", "$includeRoot\freetype2\freetype\freetype.h")
          Test-AnyPath "libpng header" @("$includeRoot\png.h", "$includeRoot\libpng16\png.h")
          Test-AnyPath "libxml2 header" @("$includeRoot\libxml2\libxml\xmlwriter.h")
          Test-AnyPath "netCDF header" @("$includeRoot\netcdf.h")
          Test-AnyPath "MMTF header" @("$includeRoot\mmtf\structure_data.hpp")
          Test-AnyPath "msgpack-c header" @("$includeRoot\msgpack.hpp", "$includeRoot\msgpack\version_master.hpp")

          Test-AnyPath "GLEW import library" @("$libRoot\glew32.lib")
          Test-AnyPath "FreeType import library" @("$libRoot\freetype.lib")
          Test-AnyPath "libpng import library" @("$libRoot\libpng.lib", "$libRoot\libpng16.lib")
          Test-AnyPath "libxml2 import library" @("$libRoot\libxml2.lib")
          Test-AnyPath "netCDF import library" @("$libRoot\netcdf.lib")

          Test-AnyPath "GLEW runtime DLL" @("$binRoot\glew32.dll")
          Test-AnyPath "FreeType runtime DLL" @("$binRoot\freetype.dll")
          Test-AnyPath "libpng runtime DLL" @("$binRoot\libpng16.dll", "$binRoot\libpng.dll")
          Test-AnyPath "libxml2 runtime DLL" @("$binRoot\libxml2.dll")
          Test-AnyPath "netCDF runtime DLL" @("$binRoot\netcdf.dll")

          python -c "import numpy; print('numpy', numpy.__version__)"
          cmake --version
          if (-not (Get-Command collada2gltf -ErrorAction SilentlyContinue)) {
            $missing.Add("collada2gltf executable on PATH")
          }

          if ($missing.Count -gt 0) {
            Write-Host "Missing Windows build inputs:"
            $missing | ForEach-Object { Write-Host "  $_" }
            throw "Missing $($missing.Count) Windows build input(s)"
          }

      - name: Build wheel
        run: |
          conda activate $env:CONDA_ENV_NAME
          $libxml2Include = "$env:CONDA_PREFIX\Library\include\libxml2"
          if (-not (Test-Path "$libxml2Include\libxml\xmlwriter.h")) {
            $xmlwriter = Get-ChildItem "$env:CONDA_PREFIX\Library\include" -Recurse -Filter xmlwriter.h | Select-Object -First 1
            if ($xmlwriter -and $xmlwriter.Directory.Name -eq "libxml") {
              $libxml2Include = $xmlwriter.Directory.Parent.FullName
            }
          }
          if (-not (Test-Path "$libxml2Include\libxml\xmlwriter.h")) {
            throw "Missing libxml2 header: $libxml2Include\libxml\xmlwriter.h"
          }
          $env:INCLUDE = "$libxml2Include;$env:INCLUDE"
          $env:CMAKE_INCLUDE_PATH = "$libxml2Include;$env:CMAKE_INCLUDE_PATH"
          python setup.py bdist_wheel --testing=false

      - name: Rename wheel
        run: |
          conda activate $env:CONDA_ENV_NAME
          pip install --upgrade change-wheel-version
          Get-ChildItem dist
          $wheel = Get-ChildItem dist/*.whl | Select-Object -First 1
          python wheel-build-repo/.github/scripts/rename_wheel_distribution.py $wheel.FullName --name pymol-opensource-wl --delete-old
          if ("${{ needs.detect-version.outputs.is_exact_release }}" -ne "true") {
            $wheel = Get-ChildItem dist/pymol_opensource_wl*.whl | Select-Object -First 1
            python -m change_wheel_version $wheel.FullName `
              --version "${{ needs.detect-version.outputs.wheel_version }}" `
              --delete-old-wheel
          }

      - name: Bundle Windows DLL dependencies
        run: |
          conda activate $env:CONDA_ENV_NAME
          pip install --upgrade delvewheel
          New-Item -ItemType Directory -Force wheelhouse | Out-Null
          $wheel = Get-ChildItem dist/pymol_opensource_wl*.whl | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          python -m delvewheel repair $wheel.FullName `
            --add-path "$env:CONDA_PREFIX\Library\bin" `
            --wheel-dir wheelhouse
          Get-ChildItem wheelhouse

      - name: Test repaired Windows wheel in isolated venv
        run: |
          conda activate $env:CONDA_ENV_NAME
          python -m venv wheel-test
          $python = ".\wheel-test\Scripts\python.exe"
          $wheel = Get-ChildItem wheelhouse/pymol_opensource_wl*.whl | Select-Object -First 1
          & $python -m pip install --upgrade pip numpy
          & $python -m pip install --no-deps $wheel.FullName

          $condaLibraryBin = [System.IO.Path]::GetFullPath("$env:CONDA_PREFIX\Library\bin").TrimEnd('\')
          $env:PATH = (($env:PATH -split ';') | Where-Object {
            if (-not $_) {
              $false
            } else {
              try {
                [System.IO.Path]::GetFullPath($_).TrimEnd('\') -ne $condaLibraryBin
              } catch {
                $true
              }
            }
          }) -join ';'

          & $python -c "import pymol; import pymol._cmd; print('pymol._cmd import ok')"

      - name: Upload wheel
        uses: actions/upload-artifact@v6
        with:
          name: pymol-windows-${{ matrix.python-version }}
          path: wheelhouse/pymol_opensource_wl*.whl

